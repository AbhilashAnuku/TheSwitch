name: Feature request
description: Suggest an idea or improvement for TheSwitch
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the library zero-dependency
        - label: This is privacy-first (no network unless the user opts in)
        - label: This fits "theming only" (translation belongs in the sibling library, Mr.Latin)
